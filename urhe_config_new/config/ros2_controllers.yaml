# This config file is used by ros2_control (demo.launch.py only)
# It is NOT used by moveit_only.launch.py + ur_control.launch.py workflow.
#
# hand_e_controller is intentionally removed — the gripper is controlled
# via TCP socket by the hande_bridge node, not through ros2_control hardware.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    ur_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ur_arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: false